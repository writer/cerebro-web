name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cerebro-web
    steps:
      - name: Checkout web
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          path: cerebro-web

      - name: Resolve expensive validation scope
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          run_full=false
          range=""
          zero="0000000000000000000000000000000000000000"
          case "${EVENT_NAME}" in
            pull_request)
              range="${BASE_SHA}...${HEAD_SHA}"
              ;;
            push)
              run_full=true
              ;;
            workflow_dispatch)
              run_full=true
              ;;
            *)
              range="origin/main...HEAD"
              ;;
          esac

          if [ "${run_full}" = "true" ]; then
            needs_e2e=true
            needs_docker=true
            echo "Running full expensive validation for ${EVENT_NAME}."
          else
            if [ -z "${range}" ] || [[ "${range}" == "${zero}"* ]]; then
              base="$(git merge-base origin/main "${AFTER_SHA}" 2>/dev/null || true)"
              if [ -n "${base}" ]; then
                range="${base}...${AFTER_SHA}"
              else
                range="origin/main...HEAD"
              fi
            fi
            changed_files="$(git diff --name-only "${range}")"
            printf '%s\n' "${changed_files}"
            expensive_pattern='^(src/|public/|scripts/local-grc-e2e\.mjs|package(-lock)?\.json|next\.config\.ts|tsconfig\.json|Dockerfile|\.dockerignore)$'
            docker_pattern='^(src/|public/|package(-lock)?\.json|next\.config\.ts|Dockerfile|\.dockerignore)$'
            if grep -Eq "${expensive_pattern}" <<< "${changed_files}"; then
              needs_e2e=true
            else
              needs_e2e=false
            fi
            if grep -Eq "${docker_pattern}" <<< "${changed_files}"; then
              needs_docker=true
            else
              needs_docker=false
            fi
          fi
          {
            echo "needs_e2e=${needs_e2e}"
            echo "needs_docker=${needs_docker}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout Cerebro
        if: steps.scope.outputs.needs_e2e == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: writer/cerebro
          ref: main
          path: cerebro

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cerebro-web/package-lock.json

      - name: Setup Go
        if: steps.scope.outputs.needs_e2e == 'true'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cerebro/go.mod
          cache: false

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        if: steps.scope.outputs.needs_e2e == 'true'
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: OSS audit
        run: npm run oss:audit

      - name: Local GRC E2E
        if: steps.scope.outputs.needs_e2e == 'true'
        run: npm run e2e:grc:local -- --browser
        env:
          CEREBRO_REPO: ${{ github.workspace }}/cerebro
          CEREBRO_GRC_E2E_BROWSER_PROVIDER: playwright

      - name: Set up Buildx
        if: steps.scope.outputs.needs_docker == 'true'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker build
        if: steps.scope.outputs.needs_docker == 'true'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./cerebro-web
          pull: true
          load: true
          tags: cerebro-web:ci
          cache-from: type=gha,scope=cerebro-web-ci
          cache-to: type=gha,mode=max,scope=cerebro-web-ci

      - name: High severity audit
        run: npm run audit:high
