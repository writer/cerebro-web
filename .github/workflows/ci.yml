name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cerebro-web
    steps:
      - name: Checkout web
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: cerebro-web

      - name: Checkout Cerebro
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: writer/cerebro
          ref: main
          path: cerebro

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cerebro-web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: cerebro/go.mod

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: OSS audit
        run: npm run oss:audit

      - name: Local GRC E2E
        run: npm run e2e:grc:local -- --browser
        env:
          CEREBRO_REPO: ${{ github.workspace }}/cerebro
          CEREBRO_GRC_E2E_BROWSER_PROVIDER: playwright

      - name: Docker build
        run: docker build --pull -t cerebro-web:ci .

      - name: High severity audit
        run: npm run audit:high
