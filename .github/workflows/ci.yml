name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scope:
    name: Resolve validation scope
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cerebro-web
    outputs:
      needs_e2e: ${{ steps.scope.outputs.needs_e2e }}
      needs_docker: ${{ steps.scope.outputs.needs_docker }}
    steps:
      - name: Checkout web
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          path: cerebro-web

      - name: Resolve expensive validation scope
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          run_full=false
          range=""
          zero="0000000000000000000000000000000000000000"
          case "${EVENT_NAME}" in
            pull_request)
              range="${BASE_SHA}...${HEAD_SHA}"
              ;;
            push)
              run_full=true
              ;;
            workflow_dispatch)
              run_full=true
              ;;
            *)
              range="origin/main...HEAD"
              ;;
          esac

          if [ "${run_full}" = "true" ]; then
            needs_e2e=true
            needs_docker=true
            echo "Running full expensive validation for ${EVENT_NAME}."
          else
            if [ -z "${range}" ] || [[ "${range}" == "${zero}"* ]]; then
              base="$(git merge-base origin/main "${AFTER_SHA}" 2>/dev/null || true)"
              if [ -n "${base}" ]; then
                range="${base}...${AFTER_SHA}"
              else
                range="origin/main...HEAD"
              fi
            fi
            changed_files="$(git diff --name-only "${range}")"
            printf '%s\n' "${changed_files}"
            expensive_pattern='^(src/|public/|scripts/local-grc-e2e\.mjs|package(-lock)?\.json|next\.config\.ts|tsconfig\.json|Dockerfile|\.dockerignore)$'
            docker_pattern='^(src/|public/|package(-lock)?\.json|next\.config\.ts|Dockerfile|\.dockerignore)$'
            if grep -Eq "${expensive_pattern}" <<< "${changed_files}"; then
              needs_e2e=true
            else
              needs_e2e=false
            fi
            if grep -Eq "${docker_pattern}" <<< "${changed_files}"; then
              needs_docker=true
            else
              needs_docker=false
            fi
          fi
          {
            echo "needs_e2e=${needs_e2e}"
            echo "needs_docker=${needs_docker}"
          } >> "$GITHUB_OUTPUT"

  node-validation:
    name: Node validation
    needs: scope
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cerebro-web
    steps:
      - name: Checkout web
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          path: cerebro-web

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cerebro-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: OSS audit
        run: npm run oss:audit

      - name: High severity audit
        run: npm run audit:high

  local-grc-e2e:
    name: Local GRC E2E
    needs: scope
    if: needs.scope.outputs.needs_e2e == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cerebro-web
    steps:
      - name: Checkout web
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          path: cerebro-web

      - name: Checkout Cerebro
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: writer/cerebro
          ref: main
          path: cerebro

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cerebro-web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: cerebro/go.mod
          cache: false

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Local GRC E2E
        run: npm run e2e:grc:local -- --browser
        env:
          CEREBRO_REPO: ${{ github.workspace }}/cerebro
          CEREBRO_GRC_E2E_BROWSER_PROVIDER: playwright

  docker-build:
    name: Docker build
    needs: scope
    if: needs.scope.outputs.needs_docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout web
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Docker build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          pull: true
          load: true
          tags: cerebro-web:ci
          cache-from: type=gha,scope=cerebro-web-ci
          cache-to: type=gha,mode=max,scope=cerebro-web-ci

  validate:
    name: validate
    needs:
      - node-validation
      - local-grc-e2e
      - docker-build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check validation jobs
        shell: bash
        env:
          NODE_VALIDATION_RESULT: ${{ needs.node-validation.result }}
          E2E_RESULT: ${{ needs.local-grc-e2e.result }}
          DOCKER_RESULT: ${{ needs.docker-build.result }}
        run: |
          set -euo pipefail
          echo "node-validation=${NODE_VALIDATION_RESULT}"
          echo "local-grc-e2e=${E2E_RESULT}"
          echo "docker-build=${DOCKER_RESULT}"
          if [ "${NODE_VALIDATION_RESULT}" != "success" ]; then
            echo "Node validation failed or did not run" >&2
            exit 1
          fi
          for result in "${E2E_RESULT}" "${DOCKER_RESULT}"; do
            if [ "${result}" != "success" ] && [ "${result}" != "skipped" ]; then
              echo "Expensive validation failed with result ${result}" >&2
              exit 1
            fi
          done
