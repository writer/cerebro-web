name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag. Defaults to sha-<commit>.
        required: false
        type: string
      wait_for_promotion:
        description: Wait for the downstream infra promotion workflow to complete.
        default: false
        required: false
        type: boolean

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate-release:
    name: Validate release source
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
      image: ${{ steps.image.outputs.image }}
      image_tags: ${{ steps.image.outputs.tags }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release source
        run: |
          npm test
          npm run lint
          npm run build
          npm run oss:audit
          npm run audit:high

      - name: Resolve image tags
        id: image
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs['image_tag'] || '' }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          elif [ -n "${INPUT_TAG}" ]; then
            tag="${INPUT_TAG}"
          else
            tag="sha-${short_sha}"
          fi
          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ] && [ "${tag}" != "sha-${short_sha}" ]; then
            echo "Main releases must use sha-${short_sha} so infra promotion can verify the source commit" >&2
            exit 1
          fi
          if ! [[ "${tag}" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$ ]]; then
            echo "Invalid image tag: ${tag}" >&2
            exit 1
          fi
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          {
            echo "image=${image}"
            echo "tag=${tag}"
            echo "tags<<EOF"
            echo "${image}:${tag}"
            if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved ${image}:${tag}"

  build-platform:
    name: Build ${{ matrix.platform }}
    needs: validate-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push platform image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          pull: true
          provenance: mode=max
          sbom: true
          outputs: type=image,name=${{ needs.validate-release.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=cerebro-web-release-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=cerebro-web-release-${{ matrix.arch }}

      - name: Export platform digest
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          if ! [[ "${DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Invalid platform digest: ${DIGEST}" >&2
            exit 1
          fi
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload platform digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish multi-arch image
    needs:
      - validate-release
      - build-platform
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ needs.validate-release.outputs.image_tag }}
      image: ${{ needs.validate-release.outputs.image }}
      image_digest: ${{ steps.manifest.outputs.digest }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Download platform digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create multi-arch manifest
        id: manifest
        shell: bash
        env:
          IMAGE: ${{ needs.validate-release.outputs.image }}
          IMAGE_TAG: ${{ needs.validate-release.outputs.image_tag }}
          IMAGE_TAGS: |
            ${{ needs.validate-release.outputs.image_tags }}
        run: |
          set -euo pipefail
          tag_args=()
          while IFS= read -r tag; do
            [ -n "${tag}" ] && tag_args+=("-t" "${tag}")
          done <<< "${IMAGE_TAGS}"

          digest_args=()
          shopt -s nullglob
          for digest_file in /tmp/digests/*; do
            digest="$(basename "${digest_file}")"
            digest_args+=("${IMAGE}@sha256:${digest}")
          done
          if [ "${#digest_args[@]}" -eq 0 ]; then
            echo "No platform digests were downloaded" >&2
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "${digest_args[@]}"
          manifest_digest="$(docker buildx imagetools inspect "${IMAGE}:${IMAGE_TAG}" --format '{{ .Manifest.Digest }}')"
          if ! [[ "${manifest_digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Could not resolve multi-arch manifest digest" >&2
            exit 1
          fi
          echo "digest=${manifest_digest}" >> "$GITHUB_OUTPUT"
          echo "Published ${IMAGE}:${IMAGE_TAG}@${manifest_digest}"

      - name: Scan pushed image
        shell: bash
        env:
          IMAGE: ${{ needs.validate-release.outputs.image }}
          DIGEST: ${{ steps.manifest.outputs.digest }}
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          image_ref="${IMAGE}@${DIGEST}"
          mkdir -p "${HOME}/.cache/trivy"
          docker run --rm \
            -e TRIVY_USERNAME \
            -e TRIVY_PASSWORD \
            -v "${HOME}/.cache/trivy:/root/.cache/" \
            aquasec/trivy:0.66.0 image \
            --exit-code 0 \
            --ignore-unfixed \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            "${image_ref}"
          docker run --rm \
            -e TRIVY_USERNAME \
            -e TRIVY_PASSWORD \
            -v "${HOME}/.cache/trivy:/root/.cache/" \
            aquasec/trivy:0.66.0 image \
            --exit-code 1 \
            --ignore-unfixed \
            --scanners vuln \
            --severity CRITICAL \
            "${image_ref}"

      - name: Set up cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.6.1

      - name: Keyless sign image
        shell: bash
        env:
          IMAGE: ${{ needs.validate-release.outputs.image }}
          DIGEST: ${{ steps.manifest.outputs.digest }}
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Write image summary
        shell: bash
        env:
          IMAGE: ${{ needs.validate-release.outputs.image }}
          IMAGE_TAG: ${{ needs.validate-release.outputs.image_tag }}
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          set -euo pipefail
          image_ref="${IMAGE}:${IMAGE_TAG}@${DIGEST}"
          echo "::notice title=Published image::${image_ref}"
          {
            echo "## Published image"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Image | \`${IMAGE}\` |"
            echo "| Tag | \`${IMAGE_TAG}\` |"
            echo "| Digest | \`${DIGEST}\` |"
            echo "| Pull by digest | \`${IMAGE}@${DIGEST}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  notify-infra:
    name: Notify infra for deployment
    needs: publish
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch' && github.ref_name == 'main'
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Fetch secrets from Infisical
        uses: WriterInternal/devops-github-actions/infisical-secrets@2b7c38445cb1b9c43f88d7ec990ccb1534078ae8 # v2.4.0
        with:
          org-identity-id: ${{ secrets.INFISICAL_ORG_IDENTITY_UUID }}
          org-project-slug: ${{ secrets.INFISICAL_ORG_PROJECT_SLUG }}
          repo-identity-id: ${{ secrets.INFISICAL_REPO_IDENTITY_UUID }}
          repo-project-slug: ${{ secrets.INFISICAL_REPO_PROJECT_SLUG }}
          env-slug: prod
          required-keys: CEREBRO_INFRA_PROMOTION_TOKEN CEREBRO_INFRA_REPOSITORY CEREBRO_INFRA_TARGET_ENVIRONMENT

      - name: Dispatch web image promotion
        id: dispatch
        shell: bash
        env:
          GH_TOKEN: ${{ env.CEREBRO_INFRA_PROMOTION_TOKEN }}
          INFRA_REPOSITORY: ${{ env.CEREBRO_INFRA_REPOSITORY }}
          WEB_IMAGE: ${{ needs.publish.outputs.image }}
          WEB_IMAGE_TAG: ${{ needs.publish.outputs.image_tag }}
          WEB_IMAGE_DIGEST: ${{ needs.publish.outputs.image_digest }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_REF: ${{ github.sha }}
          TARGET_ENVIRONMENT: ${{ env.CEREBRO_INFRA_TARGET_ENVIRONMENT }}
          WAIT_FOR_PROMOTION: ${{ github.event.inputs['wait_for_promotion'] || 'false' }}
        run: |
          set -euo pipefail
          write_promotion_summary() {
            local status="$1"
            {
              echo "## Infra promotion"
              echo
              echo "| Field | Value |"
              echo "| --- | --- |"
              echo "| Target | \`${TARGET_ENVIRONMENT}\` |"
              echo "| Image | \`${WEB_IMAGE}:${WEB_IMAGE_TAG}\` |"
              echo "| Digest | \`${WEB_IMAGE_DIGEST}\` |"
              echo "| Source | \`${SOURCE_REPOSITORY}@${SOURCE_REF}\` |"
              echo "| Request ID | \`${request_id:-unknown}\` |"
              if [ -n "${run_url:-}" ]; then
                echo "| Promotion run | [${run_id}](${run_url}) |"
              else
                echo "| Promotion run | Not observed |"
              fi
              echo "| Waited for completion | \`${WAIT_FOR_PROMOTION}\` |"
              echo "| Status | ${status} |"
            } >> "$GITHUB_STEP_SUMMARY"
          }

          if [ -z "${GH_TOKEN}" ]; then
            echo "ERROR: CEREBRO_INFRA_PROMOTION_TOKEN is required for main release promotion" >&2
            exit 1
          fi
          if ! [[ "${INFRA_REPOSITORY}" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "ERROR: CEREBRO_INFRA_REPOSITORY must be configured as owner/repo for deploy dispatches" >&2
            exit 1
          fi
          if [ -z "${TARGET_ENVIRONMENT}" ] || ! [[ "${TARGET_ENVIRONMENT}" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "ERROR: CEREBRO_INFRA_TARGET_ENVIRONMENT must be configured for deploy dispatches" >&2
            exit 1
          fi
          if [ "${SOURCE_REPOSITORY}" != "writer/cerebro-web" ]; then
            echo "ERROR: release source must be writer/cerebro-web" >&2
            exit 1
          fi
          if [ "${WEB_IMAGE}" != "ghcr.io/writer/cerebro-web" ]; then
            echo "ERROR: release image must be ghcr.io/writer/cerebro-web" >&2
            exit 1
          fi
          if ! [[ "${SOURCE_REF}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "ERROR: release source ref must be a full commit SHA" >&2
            exit 1
          fi
          if [ "${WEB_IMAGE_TAG}" != "sha-${SOURCE_REF:0:12}" ]; then
            echo "ERROR: web image tag ${WEB_IMAGE_TAG} does not match source ref ${SOURCE_REF}" >&2
            exit 1
          fi
          if ! [[ "${WEB_IMAGE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "ERROR: web image digest must be a sha256 digest" >&2
            exit 1
          fi

          handler="$(mktemp)"
          gh api "repos/${INFRA_REPOSITORY}/contents/.github/workflows/propose-web-image-tag.yml?ref=main" --jq .content \
            | base64 -d > "${handler}"
          if ! grep -Eq '^[[:space:]]*repository_dispatch:' "${handler}" || ! grep -Eq 'cerebro-web-release-published' "${handler}"; then
            echo "ERROR: configured deploy repository does not have the cerebro-web-release-published handler installed" >&2
            exit 1
          fi

          requested_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          request_id="cerebro-web-${WEB_IMAGE_TAG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          jq -n \
            --arg tag "${WEB_IMAGE_TAG}" \
            --arg digest "${WEB_IMAGE_DIGEST}" \
            --arg image "${WEB_IMAGE}" \
            --arg source_repository "${SOURCE_REPOSITORY}" \
            --arg source_ref "${SOURCE_REF}" \
            --arg request_id "${request_id}" \
            --arg target_environment "${TARGET_ENVIRONMENT}" \
            '{
              event_type: "cerebro-web-release-published",
              client_payload: {
                web_image_tag: $tag,
                web_image_digest: $digest,
                web_image: $image,
                source_repository: $source_repository,
                source_ref: $source_ref,
                request_id: $request_id,
                target_environment: $target_environment,
                apply_mode: "direct_push"
              }
            }' | gh api --method POST "repos/${INFRA_REPOSITORY}/dispatches" --input -

          deadline=$((SECONDS + 120))
          run_id=""
          run_url=""
          while [ "${SECONDS}" -lt "${deadline}" ]; do
            run="$(
              gh run list \
                --repo "${INFRA_REPOSITORY}" \
                --workflow propose-web-image-tag.yml \
                --event repository_dispatch \
                --json createdAt,databaseId,displayTitle,url \
                --limit 20 \
                | jq -r --arg requested_at "${requested_at}" --arg request_id "${request_id}" '.[] | select(.createdAt >= $requested_at and ((.displayTitle // "") | contains($request_id))) | [.databaseId, .url] | @tsv' \
                | head -n 1
            )"
            if [ -n "${run}" ]; then
              IFS=$'\t' read -r run_id run_url <<< "${run}"
              echo "Dispatched web deploy request for ${WEB_IMAGE}:${WEB_IMAGE_TAG}@${WEB_IMAGE_DIGEST}: ${run_url}"
              break
            fi
            sleep 5
          done
          if [ -z "${run_id}" ]; then
            write_promotion_summary "dispatch accepted, but no matching run was observed"
            echo "ERROR: repository_dispatch was accepted, but no matching propose-web-image-tag.yml run appeared" >&2
            exit 1
          fi
          {
            echo "promotion_run_id=${run_id}"
            echo "promotion_run_url=${run_url}"
          } >> "$GITHUB_OUTPUT"
          if [ "${WAIT_FOR_PROMOTION}" != "true" ]; then
            write_promotion_summary "started"
            echo "::notice title=Infra promotion started::${run_url}"
            echo "Promotion run ${run_id} started: ${run_url}"
            exit 0
          fi

          deadline=$((SECONDS + 1800))
          while [ "${SECONDS}" -lt "${deadline}" ]; do
            status_payload="$(gh run view "${run_id}" --repo "${INFRA_REPOSITORY}" --json status,conclusion,url)"
            status="$(jq -r '.status' <<< "${status_payload}")"
            conclusion="$(jq -r '.conclusion // ""' <<< "${status_payload}")"
            if [ "${status}" = "completed" ]; then
              if [ "${conclusion}" != "success" ]; then
                write_promotion_summary "completed with ${conclusion}"
                echo "ERROR: promotion run ${run_id} completed with ${conclusion}: ${run_url}" >&2
                exit 1
              fi
              write_promotion_summary "completed successfully"
              echo "::notice title=Infra promotion completed::${run_url}"
              echo "Promotion run ${run_id} completed successfully: ${run_url}"
              exit 0
            fi
            sleep 15
          done
          write_promotion_summary "timed out"
          echo "ERROR: promotion run ${run_id} did not complete before timeout: ${run_url}" >&2
          exit 1
