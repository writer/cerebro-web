name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag. Defaults to sha-<commit>.
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release source
        run: |
          npm run lint
          npm run build
          npm run oss:audit
          npm run audit:high

      - name: Resolve image tags
        id: image
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.image_tag || '' }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          elif [ -n "${INPUT_TAG}" ]; then
            tag="${INPUT_TAG}"
          else
            tag="sha-${short_sha}"
          fi
          if ! [[ "${tag}" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$ ]]; then
            echo "Invalid image tag: ${tag}" >&2
            exit 1
          fi
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          {
            echo "image=${image}"
            echo "tag=${tag}"
            echo "tags<<EOF"
            echo "${image}:${tag}"
            if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved ${image}:${tag}"

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build local image
        run: docker build --pull -t cerebro-web:scan .

      - name: Scan local image
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.cache/trivy"
          docker run --rm \
            -v "${HOME}/.cache/trivy:/root/.cache/" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.66.0 image \
            --exit-code 0 \
            --ignore-unfixed \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            cerebro-web:scan
          docker run --rm \
            -v "${HOME}/.cache/trivy:/root/.cache/" \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.66.0 image \
            --exit-code 1 \
            --ignore-unfixed \
            --scanners vuln \
            --severity CRITICAL \
            cerebro-web:scan

      - name: Build and push image
        id: build-push
        shell: bash
        env:
          IMAGE_TAGS: |
            ${{ steps.image.outputs.tags }}
        run: |
          set -euo pipefail
          tag_args=()
          while IFS= read -r tag; do
            [ -n "${tag}" ] && tag_args+=("-t" "${tag}")
          done <<< "${IMAGE_TAGS}"
          metadata_file="$(mktemp)"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --provenance=mode=max \
            --sbom=true \
            --metadata-file "${metadata_file}" \
            "${tag_args[@]}" \
            --push \
            .
          digest="$(jq -r '."containerimage.digest" // empty' "${metadata_file}")"
          if [ -z "${digest}" ]; then
            echo "Could not resolve pushed image digest" >&2
            cat "${metadata_file}" >&2
            exit 1
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Published ${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}@${digest}"

      - name: Set up cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.6.1

      - name: Keyless sign image
        shell: bash
        env:
          IMAGE: ${{ steps.image.outputs.image }}
          DIGEST: ${{ steps.build-push.outputs.digest }}
          COSIGN_EXPERIMENTAL: "true"
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE}@${DIGEST}"

    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
      image: ${{ steps.image.outputs.image }}
      image_digest: ${{ steps.build-push.outputs.digest }}

  notify-infra:
    name: Notify infra for deployment
    needs: publish
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch' && github.ref_name == 'main'
    steps:
      - name: Dispatch web image promotion
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.CEREBRO_INFRA_PROMOTION_TOKEN }}
          INFRA_REPOSITORY: ${{ secrets.CEREBRO_INFRA_REPOSITORY }}
          WEB_IMAGE: ${{ needs.publish.outputs.image }}
          WEB_IMAGE_TAG: ${{ needs.publish.outputs.image_tag }}
          WEB_IMAGE_DIGEST: ${{ needs.publish.outputs.image_digest }}
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_REF: ${{ github.sha }}
          TARGET_ENVIRONMENT: ${{ secrets.CEREBRO_INFRA_TARGET_ENVIRONMENT }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::CEREBRO_INFRA_PROMOTION_TOKEN is not configured; skipping web deploy dispatch for ${WEB_IMAGE_TAG}"
            exit 0
          fi
          if [ -z "${TARGET_ENVIRONMENT}" ]; then
            echo "::warning::CEREBRO_INFRA_TARGET_ENVIRONMENT is not configured; skipping web deploy dispatch for ${WEB_IMAGE_TAG}"
            exit 0
          fi
          if ! [[ "${INFRA_REPOSITORY}" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "ERROR: CEREBRO_INFRA_REPOSITORY must be configured as owner/repo for deploy dispatches" >&2
            exit 1
          fi

          handler="$(mktemp)"
          gh api "repos/${INFRA_REPOSITORY}/contents/.github/workflows/propose-web-image-tag.yml?ref=main" --jq .content \
            | base64 -d > "${handler}"
          if ! grep -Eq '^[[:space:]]*repository_dispatch:' "${handler}" || ! grep -Eq 'cerebro-web-release-published' "${handler}"; then
            echo "ERROR: configured deploy repository does not have the cerebro-web-release-published handler installed" >&2
            exit 1
          fi

          requested_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          request_id="cerebro-web-${WEB_IMAGE_TAG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          jq -n \
            --arg tag "${WEB_IMAGE_TAG}" \
            --arg digest "${WEB_IMAGE_DIGEST}" \
            --arg image "${WEB_IMAGE}" \
            --arg source_repository "${SOURCE_REPOSITORY}" \
            --arg source_ref "${SOURCE_REF}" \
            --arg request_id "${request_id}" \
            --arg target_environment "${TARGET_ENVIRONMENT}" \
            '{
              event_type: "cerebro-web-release-published",
              client_payload: {
                web_image_tag: $tag,
                web_image_digest: $digest,
                web_image: $image,
                source_repository: $source_repository,
                source_ref: $source_ref,
                request_id: $request_id,
                target_environment: $target_environment,
                apply_mode: "direct_push"
              }
            }' | gh api --method POST "repos/${INFRA_REPOSITORY}/dispatches" --input -

          deadline=$((SECONDS + 120))
          while [ "${SECONDS}" -lt "${deadline}" ]; do
            run_url="$(
              gh run list \
                --repo "${INFRA_REPOSITORY}" \
                --workflow propose-web-image-tag.yml \
                --event repository_dispatch \
                --json createdAt,displayTitle,url \
                --limit 20 \
                | jq -r --arg requested_at "${requested_at}" --arg request_id "${request_id}" '.[] | select(.createdAt >= $requested_at and ((.displayTitle // "") | contains($request_id))) | .url' \
                | head -n 1
            )"
            if [ -n "${run_url}" ]; then
              echo "Dispatched web deploy request for ${WEB_IMAGE}:${WEB_IMAGE_TAG}@${WEB_IMAGE_DIGEST}: ${run_url}"
              exit 0
            fi
            sleep 5
          done
          echo "ERROR: repository_dispatch was accepted, but no matching propose-web-image-tag.yml run appeared" >&2
          exit 1
